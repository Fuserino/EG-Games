<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏇 Hei på hesten!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap');
  :root{--gold:#FFD700;--dark:#0d0d0d;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Barlow Condensed',sans-serif;background:var(--dark);color:white;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px;}

  .top{text-align:center;margin-bottom:20px;}
  .top h1{font-family:'Bebas Neue',cursive;font-size:2.2rem;color:var(--gold);letter-spacing:4px;}
  .top p{font-size:.95rem;color:rgba(255,255,255,.45);letter-spacing:1px;margin-top:4px;}

  #status-bar{font-family:'Bebas Neue',cursive;font-size:1rem;letter-spacing:3px;text-align:center;padding:8px 20px;border-radius:20px;margin-bottom:18px;min-height:2.2rem;transition:all .3s;}
  #status-bar.idle{color:rgba(255,255,255,.3);background:transparent;}
  #status-bar.drawing{color:#ffcc44;background:rgba(255,200,0,.1);border:1px solid rgba(255,200,0,.25);animation:pulse 1.5s ease-in-out infinite;}
  #status-bar.running{color:#44ff88;background:rgba(0,255,100,.1);border:1px solid rgba(0,255,100,.25);}
  #status-bar.finished{color:var(--gold);background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.3);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.55;}}

  /* WINNER CARD */
  #winner-card{display:none;width:100%;max-width:420px;background:linear-gradient(135deg,#1a0f00,#2d1a00);border:2px solid var(--gold);border-radius:16px;padding:24px;text-align:center;margin-bottom:20px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
  #winner-card.show{display:block;}
  @keyframes popIn{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
  .wc-trophy{font-size:2.8rem;margin-bottom:6px;}
  .wc-label{font-family:'Bebas Neue',cursive;font-size:.9rem;letter-spacing:3px;color:rgba(255,215,0,.6);}
  .wc-ticket{font-family:'Bebas Neue',cursive;font-size:2rem;color:white;letter-spacing:2px;margin:4px 0;}
  .wc-wine{font-size:.9rem;color:rgba(255,255,255,.55);letter-spacing:1px;}

  /* HORSES */
  #horses-grid{display:flex;flex-direction:column;gap:12px;width:100%;max-width:420px;}

  .horse-btn{
    display:flex;align-items:center;gap:16px;
    background:rgba(255,255,255,.11);
    border:2px solid rgba(255,255,255,.22);
    border-radius:16px;padding:15px 18px;
    cursor:pointer;transition:all .2s;
    width:100%;text-align:left;
    -webkit-user-select:none;user-select:none;
    animation:slideIn .35s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes slideIn{from{transform:translateY(20px) scale(.9);opacity:0;}to{transform:translateY(0) scale(1);opacity:1;}}
  .horse-btn:active{transform:scale(0.96);}
  .horse-btn.locked{opacity:.55;cursor:not-allowed;}
  .horse-btn.cheered{border-color:var(--gold);background:rgba(255,215,0,.14);box-shadow:0 0 18px rgba(255,215,0,.2);}
  .horse-btn.cheered .hb-name{color:var(--gold);}

  .hb-bubble{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.75rem;flex-shrink:0;border:3px solid;}
  .hb-info{flex:1;min-width:0;}
  .hb-name{font-family:'Bebas Neue',cursive;font-size:1.45rem;letter-spacing:2px;display:block;color:white;}
  .hb-ticket{font-size:.88rem;color:rgba(255,255,255,.65);letter-spacing:1px;display:block;margin-top:2px;}
  .hb-cheers{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:rgba(255,255,255,.45);flex-shrink:0;min-width:44px;text-align:right;}
  .hb-cheers.active{color:var(--gold);}

  /* STATES */
  .state-msg{text-align:center;padding:32px 16px;color:rgba(255,255,255,.35);font-size:1rem;letter-spacing:1px;line-height:1.6;}
  .state-msg .icon{font-size:2.8rem;display:block;margin-bottom:10px;}

  .my-cheer-banner{display:none;width:100%;max-width:420px;text-align:center;padding:12px;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);border-radius:12px;margin-top:8px;font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--gold);letter-spacing:2px;}
  .my-cheer-banner.show{display:block;}
  .my-cheer-sub{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;color:rgba(255,215,0,.55);letter-spacing:1px;margin-top:2px;}

  .cheer-pop{position:fixed;pointer-events:none;font-size:2.2rem;animation:popUp .9s ease-out forwards;z-index:99;}
  @keyframes popUp{0%{transform:translateY(0) scale(.5);opacity:1;}60%{transform:translateY(-70px) scale(1.2);opacity:1;}100%{transform:translateY(-120px) scale(1);opacity:0;}}
</style>
</head>
<body>

<div class="top">
  <h1>🏇 Hei på hesten!</h1>
  <p>Trykk på hesten du heier på</p>
</div>

<div id="status-bar" class="idle">Kobler til...</div>
<div id="winner-card">
  <div class="wc-trophy">🏆</div>
  <div class="wc-label">VINNEREN ER</div>
  <div class="wc-ticket" id="wc-ticket"></div>
  <div class="wc-wine" id="wc-wine"></div>
</div>
<div id="horses-grid"></div>
<div class="my-cheer-banner" id="my-banner">
  <div id="my-banner-text">Du heier på ???</div>
  <div class="my-cheer-sub">Trykk på en annen for å bytte</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction, set, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBf2y5UvDRCcw3tlLiX6D2-Kpm5QygyXN4",
  authDomain: "eg-games-708e8.firebaseapp.com",
  databaseURL: "https://eg-games-708e8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "eg-games-708e8",
  storageBucket: "eg-games-708e8.firebasestorage.app",
  messagingSenderId: "706613204445",
  appId: "1:706613204445:web:3f754ac728cd46f0281234"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── Register as viewer ──
const _viewerId = 'v_' + Math.random().toString(36).slice(2,10) + '_' + Date.now();
let _myColor = null;
let _viewerRef = null;

function registerViewer(){
  _viewerRef = ref(db, 'currentRace/viewers/' + _viewerId);
  set(_viewerRef, { color: null });
  // Auto-remove on disconnect
  onDisconnect(_viewerRef).remove();
}

function updateViewerColor(colorHex){
  _myColor = colorHex;
  if(_viewerRef){
    set(_viewerRef, { color: colorHex });
  }
}

// Register when Firebase is ready
registerViewer();


const grid = document.getElementById('horses-grid');
const statusBar = document.getElementById('status-bar');
const winnerCard = document.getElementById('winner-card');
const myBanner = document.getElementById('my-banner');
const myBannerText = document.getElementById('my-banner-text');

let myCheer = null;
let raceStatus = 'idle';
let horses = {};      // keyed by index, revealed one by one
let cheerCounts = {};

// ── Listen to entire currentRace node ──
onValue(ref(db, 'currentRace'), (snap) => {
  const data = snap.val();
  if (!data) {
    setStatus('idle', 'Ingen løp pågår');
    winnerCard.classList.remove('show');
    grid.innerHTML = `<div class="state-msg"><span class="icon">⏳</span>Venter på at løpet starter...</div>`;
    return;
  }

  const newStatus = data.status || 'idle';
  const newHorses = data.horses || {};
  cheerCounts = data.cheers || {};

  // Always update status (not just on change)
  raceStatus = newStatus;
  handleStatusChange(raceStatus, data);

  // Update horses (revealed incrementally during drawing)
  horses = newHorses;
  renderHorses();
  updateCounts();

  // Winner
  if (raceStatus === 'finished' && data.winner) {
    showWinner(data.winner);
  } else {
    winnerCard.classList.remove('show');
  }
});

function handleStatusChange(status, data) {
  if (status === 'drawing') {
    setStatus('drawing', '🎫 TREKNING PÅGÅR...');
    winnerCard.classList.remove('show');
    myCheer = null;
    _myColor = null;
    myBanner.classList.remove('show');
    // Re-register with no color for new race
    if(_viewerRef) set(_viewerRef, { color: null });
  } else if (status === 'running') {
    setStatus('running', '🏁 LØPET ER I GANG – HEI!');
  } else if (status === 'finished') {
    setStatus('finished', '🏆 LØPET ER FERDIG!');
  } else {
    setStatus('idle', 'Ingen løp pågår');
    myCheer = null;
    myBanner.classList.remove('show');
    winnerCard.classList.remove('show');
  }
}

function setStatus(cls, text) {
  statusBar.className = 'idle';
  statusBar.className = cls;
  statusBar.textContent = text;
}

function renderHorses() {
  const keys = Object.keys(horses).sort((a,b) => +a - +b);

  if (keys.length === 0 && raceStatus === 'drawing') {
    grid.innerHTML = `<div class="state-msg"><span class="icon">🎲</span>Lodder trekkes...<br>Hestene vises etter hvert</div>`;
    return;
  }

  // Add new horses or update existing
  keys.forEach(idx => {
    const h = horses[idx];
    const existingBtn = document.getElementById('hbtn-' + idx);
    if (!existingBtn) {
      // New horse revealed – create button
      const btn = document.createElement('button');
      btn.className = 'horse-btn' + (raceStatus !== 'running' ? ' locked' : '');
      btn.id = 'hbtn-' + idx;
      const bubbleBg = `radial-gradient(circle at 40% 40%, ${h.colorHex}cc, ${h.colorHex}44)`;
      const count = cheerCounts[idx] || 0;
      btn.innerHTML = `
        <div class="hb-bubble" style="background:${bubbleBg};border-color:${h.colorHex};border-width:3px;">
          <span>${h.emoji}</span>
        </div>
        <div class="hb-info">
          <span class="hb-name">${h.name}</span>
          <span class="hb-ticket">${h.ticket}</span>
        </div>
        <div class="hb-cheers${count>0?' active':''}" id="hcount-${idx}">${count>0?'🔥 '+count:''}</div>`;
      btn.addEventListener('click', () => cheer(+idx, btn, h));
      grid.appendChild(btn);
    }

    // Lock/unlock based on status
    const btn = document.getElementById('hbtn-' + idx);
    if (btn) {
      if (raceStatus === 'running') {
        btn.classList.remove('locked');
        if (+idx === myCheer) btn.classList.add('cheered');
      } else {
        btn.classList.add('locked');
        btn.classList.remove('cheered');
      }
    }
  });
}

function updateCounts() {
  Object.keys(horses).forEach(idx => {
    const el = document.getElementById('hcount-' + idx);
    if (!el) return;
    const count = cheerCounts[idx] || 0;
    el.textContent = count > 0 ? '🔥 ' + count : '';
    el.className = 'hb-cheers' + (count > 0 ? ' active' : '');
  });
}

function showWinner(winner) {
  document.getElementById('wc-ticket').textContent = winner.name || '???';
  document.getElementById('wc-wine').textContent = winner.ticket || '';
  winnerCard.classList.add('show');
}

async function cheer(idx, btn, horse) {
  if (raceStatus !== 'running') return;

  // Remove previous cheer
  if (myCheer !== null && myCheer !== idx) {
    const prevRef = ref(db, `currentRace/cheers/${myCheer}`);
    await runTransaction(prevRef, v => Math.max(0, (v || 0) - 1));
    document.getElementById('hbtn-' + myCheer)?.classList.remove('cheered');
  }
  if (myCheer === idx) return;

  myCheer = idx;
  btn.classList.add('cheered');

  const cheerRef = ref(db, `currentRace/cheers/${idx}`);
  await runTransaction(cheerRef, v => (v || 0) + 1);
  // Update viewer color to match horse
  updateViewerColor(horse.colorHex);

  myBannerText.textContent = 'Du heier på ' + horse.name + '!';
  myBanner.classList.add('show');
  spawnPop(btn);
}

function spawnPop(btn) {
  const rect = btn.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'cheer-pop';
  pop.textContent = ['🎉','🔥','⚡','💪','🏆'][Math.floor(Math.random()*5)];
  pop.style.left = (rect.left + rect.width/2 - 16) + 'px';
  pop.style.top = (rect.top) + 'px';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 1000);
}
</script>
</body>
</html>
